<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="url(#glow)" stroke-width="2"/>
  <!-- Play triangle -->
  <polygon points="200,140 200,372 380,256" fill="url(#accent)" opacity="0.9"/>
  <!-- Film strip accents -->
  <rect x="120" y="120" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.4"/>
  <rect x="120" y="160" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.3"/>
  <rect x="120" y="200" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.25"/>
  <rect x="120" y="320" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.25"/>
  <rect x="120" y="360" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.3"/>
</svg>
